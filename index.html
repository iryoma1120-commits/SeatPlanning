<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎻 オーケストラ 座席表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080f;--bg2:#070e1c;--bg3:#0b1525;
  --border:#1a2d45;--border2:#243650;
  --text:#dde4f0;--text2:#7a90b0;--text3:#3a4e66;
  --accent:#3b82f6;--accent2:#1d4ed8;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',sans-serif;overflow-x:hidden}
input,select,button,textarea{font-family:inherit}
button{cursor:pointer}

/* ─── HEADER ─── */
#header{
  position:sticky;top:0;z-index:200;
  background:rgba(4,8,15,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
#header h1{font-size:17px;font-weight:900;letter-spacing:.02em;white-space:nowrap}
#header h1 span{font-size:11px;font-weight:400;color:var(--text2);margin-left:8px}
.hbtn{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text2);border-radius:8px;padding:6px 13px;font-size:12px;
  transition:.15s;white-space:nowrap
}
.hbtn:hover{border-color:var(--accent);color:var(--text)}
.hbtn.primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.hbtn:disabled{opacity:.35;cursor:not-allowed}
#header-right{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}

/* ─── PANELS ─── */
.panel{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;margin:12px;padding:14px 16px;
}
.panel-title{font-size:11px;font-weight:700;color:var(--text2);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}

/* ─── URL INPUT ─── */
#url-row{display:flex;gap:8px;flex-wrap:wrap}
#sheet-url{
  flex:1;min-width:220px;
  background:#060d1c;border:1px solid var(--border2);
  border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;
}
#sheet-url::placeholder{color:var(--text3)}
#load-msg{font-size:12px;margin-top:6px}
#load-msg.ok{color:#4ade80}
#load-msg.err{color:#f87171}
.hint{font-size:11px;color:var(--text3);margin-top:5px}

/* ─── SELECTORS ─── */
#sel-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.sel-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px}
.sel-group select{
  background:#060d1c;border:1px solid var(--border2);
  border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;
  min-width:130px;
}
#sess-info{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:12px;color:var(--text2)}

/* ─── TOOLBAR ─── */
#toolbar{display:flex;gap:8px;padding:10px 12px 0;flex-wrap:wrap;align-items:center}
#total-badge{
  margin-left:auto;font-size:12px;color:var(--text2);
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:5px 12px
}

/* ─── CONDUCTOR ─── */
#cnd-row{display:flex;justify-content:center;padding:12px 0 6px}
#cnd{
  background:var(--bg3);border:2px solid var(--border2);
  border-radius:10px;padding:7px 36px;
  font-size:13px;color:var(--text2);letter-spacing:.08em
}

/* ─── STAGE GRID ─── */
#stage{display:grid;gap:10px;padding:0 10px 40px}
#stage.two-col{grid-template-columns:1fr 1fr}
#stage.one-col{grid-template-columns:1fr}

/* ─── COLUMN ─── */
.col{border:1px solid var(--col-border,#3b82f6);border-radius:12px;overflow:hidden}
.col-label{
  font-size:12px;font-weight:700;padding:7px 12px;
  color:var(--col-text,#93c5fd);
  border-bottom:1px solid color-mix(in srgb,var(--col-border,#3b82f6) 25%,transparent)
}

/* ─── PULT ─── */
.pult{
  border:1px solid var(--pult-border,rgba(59,130,246,.3));
  border-radius:8px;margin:5px 7px;padding:7px 8px;
  background:var(--pult-bg,#0c1f3a);
  transition:border-color .12s,background .12s;
}
.pult.hl-pult{border-color:var(--col-border,#3b82f6)!important}
.pult-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.pult-badge{
  font-size:10px;font-weight:700;color:#fff;
  border-radius:4px;padding:2px 6px;
  background:var(--col-badge,#1d4ed8)
}
.pult-handle{
  font-size:16px;color:var(--text3);cursor:grab;
  padding:0 3px;touch-action:none;user-select:none;line-height:1
}
.pult-handle:active{color:var(--text2)}

/* ─── SLOTS ─── */
.slots{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.slot{
  border:1px dashed color-mix(in srgb,var(--col-border,#3b82f6) 30%,transparent);
  border-radius:6px;padding:3px 4px;min-height:48px;
  transition:all .1s;
}
.slot.hl-slot{
  border-color:var(--col-border,#3b82f6)!important;
  background:color-mix(in srgb,var(--col-border,#3b82f6) 15%,transparent)!important;
}
.slot-lbl{font-size:9px;color:var(--text3);margin-bottom:2px}

/* ─── MEMBER CARD ─── */
.mc{
  border:1px solid color-mix(in srgb,var(--col-border,#3b82f6) 55%,transparent);
  border-radius:5px;padding:4px 6px;min-height:30px;
  display:flex;align-items:center;
  background:#08111e;
  touch-action:none;user-select:none;-webkit-user-select:none;
  cursor:grab;transition:opacity .12s;
}
.mc:active{cursor:grabbing}
.mc.is-top{border-color:var(--col-border,#3b82f6)!important}
.mc.dragging{opacity:.25}
.mc-name{font-size:11px;font-weight:700;line-height:1.3;
  color:var(--col-text,#93c5fd);flex:1}
.mc-note{font-size:10px;color:#fbbf24;flex-shrink:0}
.mc-top-mark{font-size:10px;margin-right:2px;flex-shrink:0}
.slot-empty{font-size:15px;color:#151f2e;text-align:center;line-height:30px}

/* ─── GHOST ─── */
#sg{position:fixed;z-index:9999;pointer-events:none;border-radius:5px;
  transform:rotate(2deg) scale(1.06);
  box-shadow:0 8px 32px rgba(0,0,0,.7);opacity:.9}

/* ─── OUTPUT ─── */
#output-area{
  background:#060d1c;border:1px solid var(--border);
  border-radius:10px;padding:12px;
  font-size:12px;color:#94a3b8;
  white-space:pre;font-family:'Courier New',monospace;
  margin:0 12px 12px;max-height:220px;overflow:auto;
  display:none;
}

/* ─── EMPTY ─── */
#no-data{text-align:center;color:var(--text3);padding:40px;font-size:13px;display:none}

/* ─── LOADING SPINNER ─── */
.spin{display:inline-block;width:12px;height:12px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<div id="header">

    </div>
  </div>

</div>

<!-- ═══ STAGE ═══ -->
<div id="toolbar" style="display:none">

</div>
<div id="cnd-row" style="display:none">

// パートカラー
const COLORS = {
  Vn:   {bg:"#0c1f3a",border:"#3b82f6",text:"#93c5fd",badge:"#1d4ed8"},
  Vn1st:{bg:"#0c1f3a",border:"#3b82f6",text:"#93c5fd",badge:"#1d4ed8"},
  Vn2nd:{bg:"#0b2016",border:"#4ade80",text:"#86efac",badge:"#15803d"},
  Va:   {bg:"#14163a",border:"#818cf8",text:"#c7d2fe",badge:"#4338ca"},
  Vc:   {bg:"#180f2e",border:"#a78bfa",text:"#ddd6fe",badge:"#6d28d9"},
  Cb:   {bg:"#1a0b2e",border:"#c084fc",text:"#e9d5ff",badge:"#7e22ce"},
  Fl:   {bg:"#0c2a1a",border:"#34d399",text:"#a7f3d0",badge:"#059669"},
  Ob:   {bg:"#0c2614",border:"#4ade80",text:"#bbf7d0",badge:"#16a34a"},
  Cl:   {bg:"#122610",border:"#86efac",text:"#dcfce7",badge:"#15803d"},
  Fg:   {bg:"#16260c",border:"#a3e635",text:"#ecfccb",badge:"#4d7c0f"},
  Hr:   {bg:"#2a180c",border:"#fb923c",text:"#fed7aa",badge:"#c2410c"},
  Tp:   {bg:"#2a100c",border:"#f87171",text:"#fecaca",badge:"#b91c1c"},
  Tb:   {bg:"#260a0a",border:"#fca5a5",text:"#fee2e2",badge:"#991b1b"},
  Perc: {bg:"#1c1a0c",border:"#fde047",text:"#fef08a",badge:"#a16207"},
  default:{bg:"#141414",border:"#94a3b8",text:"#cbd5e1",badge:"#475569"},
};
function getC(part){return COLORS[part]||COLORS.default}

const PART_ORDER=["Vn1st","Vn2nd","Va","Vc","Cb","Fl","Ob","Cl","Fg","Hr","Tp","Tb","Perc","Harp","Piano","Celesta"];

// ══════════════════════════════════════════════════════════
//  アプリ状態
// ══════════════════════════════════════════════════════════
let sessions=[], allMembers=[], pults=[], history=[];
let activeDrag=null, longTimer=null, pultDrag=null;

// ══════════════════════════════════════════════════════════
//  CSV パーサ
// ══════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════
//  xlsx ファイル読み込み（SheetJS使用）
//  サーバー不要・CORS無関係でブラウザ上で直接動作
// ══════════════════════════════════════════════════════════
function loadXlsx(input){
  const file = input.files[0];
  if(!file){ return; }
  showMsg("読込中…","");

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, {type:"array"});

      // 1枚目のシートを使用
      const ws   = wb.Sheets[wb.SheetNames[0]];

      // SheetJSで2次元配列に変換（空セルは""）
      const raw  = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});

      // 全セルを文字列化
      const rows = raw.map(row => row.map(cell =>
        cell === null || cell === undefined ? "" : String(cell).trim()
      ));

      const parsed = parseAttendance(rows);
      sessions   = parsed.sessions;
      allMembers = parsed.members;

      if(sessions.length===0)   throw new Error("練習日が見つかりません（シートの構造を確認してください）");
      if(allMembers.length===0) throw new Error("メンバーが見つかりません（シートの構造を確認してください）");

      showMsg("✅ " + file.name + " — " + allMembers.length + "名・" + sessions.length + "回分を読み込みました","ok");
      buildSelectors();
      document.getElementById("sel-panel").style.display="";
      buildSeats();

    }catch(err){
      showMsg("❌ " + err.message, "err");
    }
  };
  reader.onerror = ()=>showMsg("❌ ファイルの読み込みに失敗しました","err");
  reader.readAsArrayBuffer(file);
}

// ══════════════════════════════════════════════════════════
//  出欠表パーサ（xlsx読み込み対応・強化版）
// ══════════════════════════════════════════════════════════
function parseAttendance(rows){
  // 日付行を探す（"4/26"などの日付パターンを含む行）
  let dateRowIdx=-1;
  for(let r=0;r<Math.min(10,rows.length);r++){
    if((rows[r]||[]).some(c=>/^\d+\/\d+/.test((c||"").trim()))){
      dateRowIdx=r; break;
    }
  }
  if(dateRowIdx<0) dateRowIdx=1;

  const dateRow =rows[dateRowIdx]  ||[];
  const timeRow =rows[dateRowIdx+1]||[];
  const placeRow=rows[dateRowIdx+2]||[];
  const contRow =rows[dateRowIdx+3]||[];

  // 日付列インデックスを収集
  const sessList=[];
  for(let c=0;c<dateRow.length;c++){
    const d=(dateRow[c]||"").trim();
    if(/\d+\/\d+/.test(d)){
      sessList.push({
        colIdx:c, date:d,
        time: (timeRow[c] ||"").trim(),
        place:(placeRow[c]||"").trim(),
        content:(contRow[c]||"").trim(),
      });
    }
  }

  // ヘッダー行の次からメンバーデータ収集
  const hdrRowIdx=dateRowIdx+4;
  let curPart="";
  const members=[];

  for(let r=hdrRowIdx+1;r<rows.length;r++){
    const row=rows[r]||[];
    if(row.every(c=>!(c||"").trim())) continue;

    const c0=(row[0]||"").trim();

    // パート行判定："Vn 29" / "Vn" 単体 / "Vn29" など全パターン対応
    if(/^(Vn|Va|Vc|Cb|Fl|Ob|Cl|Fg|Hr|Tp|Tb|Perc|Harp|Piano|Celesta)(\s|\d|$)/.test(c0)){
      curPart=c0.match(/^(Vn|Va|Vc|Cb|Fl|Ob|Cl|Fg|Hr|Tp|Tb|Perc|Harp|Piano|Celesta)/)[1];
      continue;
    }
    if(!c0||c0.length<2||/^\d+$/.test(c0)) continue;

    // ♪マーク: 先頭数セルのどこかにあれば対応（列ズレに強く）
    const isTop=row.slice(0,5).some(c=>(c||"").trim()==="♪");

    // 出欠データ収集
    const att={};
    for(const s of sessList){
      att[s.date]={
        status: (row[s.colIdx]  ||"").trim(),
        comment:(row[s.colIdx+1]||"").trim(),
      };
    }

    // 名前正規化：全角スペース→半角、連続スペース→1つ
    const nameWithSpace   = c0.replace(/　/g," ").replace(/\s+/g," ").trim();
    // スペースなし版も用意（"阿部有彩"など）
    const nameWithoutSpace= nameWithSpace.replace(/\s/g,"");

    // VN_PARTS照合：スペースあり→なし の順でフォールバック
    const vnInfo = VN_PARTS[nameWithSpace] || VN_PARTS[nameWithoutSpace] || null;

    members.push({
      name: nameWithSpace,
      part: curPart,
      isTop,
      vnInfo,
      att,
    });
  }
  return{sessions:sessList, members};
}

function showMsg(msg,cls){
  const el=document.getElementById("load-msg");
  el.textContent=msg;el.className=cls;
}

// ══════════════════════════════════════════════════════════
//  セレクタ構築
// ══════════════════════════════════════════════════════════
function buildSelectors(){
  // 日付
  const ds=document.getElementById("sel-date");
  ds.innerHTML=sessions.map(s=>`<option value="${s.date}">${s.date}　${s.content}</option>`).join("");
  // パート：Vnは Vn1st / Vn2nd に展開、それ以外はそのまま
  const rawParts=[...new Set(allMembers.map(m=>m.part))];
  const parts=[];
  for(const p of rawParts){
    if(p==="Vn"){ parts.push("Vn1st","Vn2nd"); }
    else { parts.push(p); }
  }
  // 重複除去・順序付け
  const uniq=[...new Set(parts)]
    .sort((a,b)=>PART_ORDER.indexOf(a)-PART_ORDER.indexOf(b));
  const ps=document.getElementById("sel-part");
  ps.innerHTML=uniq.map(p=>`<option value="${p}">${p}</option>`).join("");
}

function onCondChange(){
  updatePieceVisibility();
  buildSeats();
}

function updatePieceVisibility(){
  const p=document.getElementById("sel-part").value;
  const isVn=(p==="Vn1st"||p==="Vn2nd");
  document.getElementById("piece-group").style.display=isVn?"":"none";
}

// ══════════════════════════════════════════════════════════
//  座席表構築
// ══════════════════════════════════════════════════════════
function buildSeats(){
  history=[];
  document.getElementById("btn-undo").disabled=true;
  document.getElementById("output-area").style.display="none";

  const date=document.getElementById("sel-date").value;
  const part=document.getElementById("sel-part").value;
  const piece=document.getElementById("sel-piece").value;
  const isVn1=(part==="Vn1st");
  const isVn2=(part==="Vn2nd");
  const isVn=(isVn1||isVn2);
  // isMae・pk・sk を関数スコープで定義（プルト生成ブロックでも参照するため）
  const isMae=(piece==="前曲"||piece==="中曲");
  const pk=isMae?"mae":"main";
  const sk=isMae?"ms":"ns";

  updatePieceVisibility();

  // 出席者フィルタ
  let attending;
  if(isVn){
    const tgt=isVn1?"1st":"2nd";
    attending=allMembers.filter(m=>{
      if(m.part!=="Vn")return false;
      const a=m.att[date];
      if(!a||!["○","△","▽","◯"].includes(a.status))return false;
      if(!m.vnInfo)return isVn2;
      return m.vnInfo[pk]===tgt;
    });
  }else{
    attending=allMembers.filter(m=>{
      if(m.part!==part)return false;
      const a=m.att[date];
      return a&&["○","△","▽","◯"].includes(a.status);
    });
  }

  if(attending.length===0){
    document.getElementById("no-data").style.display="";
    document.getElementById("stage").innerHTML="";
    document.getElementById("cnd-row").style.display="none";
    document.getElementById("toolbar").style.display="none";
    document.getElementById("btn-copy").style.display="none";
    document.getElementById("btn-rebuild").style.display="none";
    pults=[];return;
  }
  document.getElementById("no-data").style.display="none";

  // プルト生成（オモテ・ウラを独立リストで管理し、人数差があっても崩れない）
  pults=[];
  if(isVn){
    // Vnはオモテ・ウラ別に並べてペアリング
    const omoList=attending.filter(m=>{
      const sk=isMae?"ms":"ns";
      return m.vnInfo?.[sk]==="オモテ";
    });
    const uraList=attending.filter(m=>{
      const sk=isMae?"ms":"ns";
      return m.vnInfo?.[sk]==="ウラ";
    });
    const noInfoList=attending.filter(m=>!m.vnInfo);
    // noInfoはウラ末尾に追加
    const uraAll=[...uraList,...noInfoList];
    const rows=Math.max(omoList.length, uraAll.length);
    for(let i=0;i<rows;i++)
      pults.push({id:"p"+(i+1),col:"L",row:i,
        slots:[omoList[i]?.name||null, uraAll[i]?.name||null]});
  }else{
    for(let i=0;i<attending.length;i+=2)
      pults.push({id:"p"+(i/2+1),col:"L",row:i/2,
        slots:[attending[i]?.name||null,attending[i+1]?.name||null]});
  }

  renderStage(part);
  document.getElementById("cnd-row").style.display="";
  document.getElementById("toolbar").style.display="";
  document.getElementById("btn-copy").style.display="";
  document.getElementById("btn-rebuild").style.display="";
  updateTotal(part);
}

// ══════════════════════════════════════════════════════════
//  ステージ描画（全パート1列）
// ══════════════════════════════════════════════════════════
function renderStage(part){
  const stage=document.getElementById("stage");
  stage.className="one-col";
  stage.innerHTML="";
  const lp=pults.filter(p=>p.col==="L").sort((a,b)=>a.row-b.row);
  stage.appendChild(makeCol(part, lp, getC(part)));
}

function makeCol(label,ps,c){
  const div=document.createElement("div");
  div.className="col";
  div.style.setProperty("--col-border",c.border);
  div.style.setProperty("--col-text",c.text);
  div.style.setProperty("--col-badge",c.badge);
  div.innerHTML=`<div class="col-label">${label}</div>`;
  ps.forEach((pult,i)=>div.appendChild(makePult(pult,i+1,c)));
  return div;
}

function makePult(pult,num,c){
  const div=document.createElement("div");
  div.className="pult";
  div.id="pult-"+pult.id;
  div.style.setProperty("--pult-bg",c.bg);
  div.style.setProperty("--pult-border",c.border+"55");

  // ハンドル
  const top=document.createElement("div");
  top.className="pult-top";
  const badge=document.createElement("span");
  badge.className="pult-badge";
  badge.style.background=c.badge;
  badge.textContent=num+"プルト";
  const handle=document.createElement("span");
  handle.className="pult-handle";
  handle.textContent="⠿";
  handle.addEventListener("pointerdown",e=>{
    e.stopPropagation();
    e.currentTarget.setPointerCapture(e.pointerId);
    pultDrag=pult.id;
  });
  handle.addEventListener("pointermove",e=>{
    if(!pultDrag)return;
    ghostMove(e.clientX,e.clientY);
  });
  handle.addEventListener("pointerup",e=>{
    ghostRemove();pultDrag=null;
  });
  top.appendChild(badge);top.appendChild(handle);

  // ドロップ受け
  div.addEventListener("pointerup",e=>{
    if(pultDrag&&pultDrag!==pult.id){
      doSwapPults(pultDrag,pult.id);
      pultDrag=null;ghostRemove();
    }
  });

  // スロット
  const slotsDiv=document.createElement("div");
  slotsDiv.className="slots";
  [0,1].forEach(si=>{
    slotsDiv.appendChild(makeSlot(pult,si,c));
  });

  div.appendChild(top);
  div.appendChild(slotsDiv);
  return div;
}

function makeSlot(pult,si,c){
  const div=document.createElement("div");
  div.className="slot";
  div.dataset.pultid=pult.id;
  div.dataset.slot=si;
  const lbl=document.createElement("div");
  lbl.className="slot-lbl";
  lbl.textContent=si===0?"オモテ":"ウラ";
  div.appendChild(lbl);
  const name=pult.slots[si];
  if(name){
    div.appendChild(makeMemberCard(name,pult.id,si,c));
  }else{
    const emp=document.createElement("div");
    emp.className="slot-empty";
    emp.dataset.pultid=pult.id;emp.dataset.slot=si;
    emp.textContent="－";
    div.appendChild(emp);
  }
  return div;
}

function makeMemberCard(name,pultId,si,c){
  const m=allMembers.find(x=>x.name===name);
  const div=document.createElement("div");
  div.className="mc"+(m?.isTop?" is-top":"");
  div.dataset.name=name;div.dataset.pultid=pultId;div.dataset.slot=si;

  if(m?.isTop){
    const s=document.createElement("span");
    s.className="mc-top-mark";s.textContent="♪";s.style.color=c.text;
    div.appendChild(s);
  }
  const n=document.createElement("span");
  n.className="mc-name";n.style.color=c.text;n.textContent=name;
  div.appendChild(n);

  // note（⚠遅刻 etc）
  const att=m?.att[document.getElementById("sel-date").value];
  if(att&&["△","▽"].includes(att.status)){
    const nt=document.createElement("span");
    nt.className="mc-note";
    nt.textContent=att.status==="△"?"⚠遅":"⚠早";
    div.appendChild(nt);
  }

  // Pointer events
  div.addEventListener("pointerdown",e=>{
    e.stopPropagation();
    e.currentTarget.setPointerCapture(e.pointerId);
    const el=e.currentTarget;
    longTimer=setTimeout(()=>{
      ghostCreate(el);ghostMove(e.clientX,e.clientY);
      activeDrag={name,srcPultId:pultId,srcSlotIdx:si};
      el.classList.add("dragging");
    },130);
  });
  div.addEventListener("pointermove",e=>{
    if(!activeDrag)return;
    ghostMove(e.clientX,e.clientY);
    // ハイライト
    document.querySelectorAll(".slot.hl-slot").forEach(el=>el.classList.remove("hl-slot"));
    document.querySelectorAll(".pult.hl-pult").forEach(el=>el.classList.remove("hl-pult"));
    const under=document.elementsFromPoint(e.clientX,e.clientY);
    const sl=under.find(el=>el.dataset?.slot!=null&&el.dataset?.pultid&&el.classList.contains("slot"));
    if(sl)sl.classList.add("hl-slot");
  });
  div.addEventListener("pointerup",e=>{
    clearTimeout(longTimer);
    ghostRemove();
    document.querySelectorAll(".slot.hl-slot").forEach(el=>el.classList.remove("hl-slot"));
    div.classList.remove("dragging");
    if(!activeDrag){activeDrag=null;return;}
    const under=document.elementsFromPoint(e.clientX,e.clientY);
    const sl=under.find(el=>el.dataset?.slot!=null&&el.dataset?.pultid&&(el.classList.contains("slot")||el.classList.contains("slot-empty")));
    if(sl){
      const dp=sl.dataset.pultid,ds=+sl.dataset.slot;
      if(dp!==activeDrag.srcPultId||ds!==activeDrag.srcSlotIdx)
        doSwap(activeDrag.srcPultId,activeDrag.srcSlotIdx,dp,ds);
    }
    activeDrag=null;
  });
  div.addEventListener("pointercancel",()=>{
    clearTimeout(longTimer);ghostRemove();
    div.classList.remove("dragging");activeDrag=null;
    document.querySelectorAll(".slot.hl-slot").forEach(el=>el.classList.remove("hl-slot"));
  });
  return div;
}

// ══════════════════════════════════════════════════════════
//  スワップロジック
// ══════════════════════════════════════════════════════════
function savePultsHistory(){
  history.push(JSON.parse(JSON.stringify(pults)));
  if(history.length>30)history.shift();
  document.getElementById("btn-undo").disabled=false;
}

function doSwap(sp,ss,dp,ds){
  savePultsHistory();
  const sv=pults.find(p=>p.id===sp)?.slots[ss]??null;
  const dv=pults.find(p=>p.id===dp)?.slots[ds]??null;
  pults=pults.map(p=>{
    const s=[...p.slots];
    if(p.id===sp&&p.id===dp){[s[ss],s[ds]]=[s[ds],s[ss]];return{...p,slots:s};}
    if(p.id===sp){s[ss]=dv;return{...p,slots:s};}
    if(p.id===dp){s[ds]=sv;return{...p,slots:s};}
    return p;
  });
  rerender();
}

function doSwapPults(aid,bid){
  savePultsHistory();
  const pa=pults.find(p=>p.id===aid),pb=pults.find(p=>p.id===bid);
  const tc=pb.col,tr=pb.row;
  pults=pults.map(p=>{
    if(p.id===aid)return{...p,col:pb.col,row:pb.row};
    if(p.id===bid)return{...p,col:pa.col,row:pa.row};
    return p;
  });
  rerender();
}

function undo(){
  if(!history.length)return;
  pults=history.pop();
  if(!history.length)document.getElementById("btn-undo").disabled=true;
  rerender();
}

function rerender(){
  const part=document.getElementById("sel-part").value;
  renderStage(part);
  updateTotal(part);
}

function updateTotal(part){
  const n=pults.reduce((s,p)=>s+p.slots.filter(Boolean).length,0);
  document.getElementById("total-badge").textContent=`${part} 出席 ${n}名`;
}

// ══════════════════════════════════════════════════════════
//  ゴースト
// ══════════════════════════════════════════════════════════
function ghostCreate(el){
  const g=document.getElementById("sg");
  const r=el.getBoundingClientRect();
  g.innerHTML=el.outerHTML;
  g.style.display="block";
  g.style.width=r.width+"px";
  g.style.left=r.left+"px";
  g.style.top=r.top+"px";
  g.style.fontSize=getComputedStyle(el).fontSize;
  g.style.background=getComputedStyle(el).background;
  g.style.border=getComputedStyle(el).border;
  g.style.color=getComputedStyle(el).color;
  g.style.padding=getComputedStyle(el).padding;
}
function ghostMove(x,y){
  const g=document.getElementById("sg");
  if(!g||g.style.display==="none")return;
  g.style.left=(x-parseFloat(g.style.width)/2)+"px";
  g.style.top=(y-18)+"px";
}
function ghostRemove(){
  const g=document.getElementById("sg");
  if(g){g.style.display="none";g.innerHTML="";}
}

// ══════════════════════════════════════════════════════════
//  テキスト出力
// ══════════════════════════════════════════════════════════
function copyText(){
  const date=document.getElementById("sel-date").value;
  const part=document.getElementById("sel-part").value;
  const piece=document.getElementById("sel-piece").value;
  const isVn=(part==="Vn1st"||part==="Vn2nd");
  const sess=sessions.find(s=>s.date===date)||{};

  let t=`【${part} 座席表】\n`;
  t+=`📅 ${date}`;
  if(sess.time) t+=`　${sess.time}`;
  if(sess.place)t+=`　${sess.place}`;
  t+="\n";
  if(isVn)t+=`🎵 ${piece}\n`;
  t+="─".repeat(16)+"\n";

  // ヘッダー行（苗字のみ）
  t+=`オモテ　　ウラ\n`;

  const lp=pults.filter(p=>p.col==="L").sort((a,b)=>a.row-b.row);
  for(let i=0;i<lp.length;i++){
    const pult=lp[i];
    const omo=lastName(pult.slots[0]||"");
    const ura=lastName(pult.slots[1]||"");
    t+=pad(omo,6)+ura+"\n";
  }

  t+="─".repeat(16)+"\n";
  const total=pults.reduce((s,p)=>s+p.slots.filter(Boolean).length,0);
  t+=`合計 ${total}名\n`;

  // 表示
  const oa=document.getElementById("output-area");
  oa.textContent=t;
  oa.style.display="block";

  // クリップボード
  navigator.clipboard.writeText(t).then(()=>{
    const btn=document.getElementById("btn-copy");
    btn.textContent="✅ コピーしました！";
    btn.style.background="#15803d";
    setTimeout(()=>{btn.textContent="📋 テキスト出力";btn.style.background="";},2200);
  }).catch(()=>{
    window.getSelection()?.selectAllChildren(oa);
  });
}

function lastName(fullName){
  // "石井 良磨" → "石井"、スペースで分割して先頭を返す
  return fullName.split(/[\s　]/)[0];
}

function pad(str,len){
  // 日本語文字は2カウント
  let w=0;
  for(const ch of str)w+=/[\u3000-\u9fff]/.test(ch)?2:1;
  return str+" ".repeat(Math.max(0,len-w));
}
